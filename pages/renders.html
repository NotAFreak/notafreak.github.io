<html lang="en">
    
    <head>
        <meta charset="UTF-8"/>

        <title>SHITTY WEBSITE TITLE - Renders</title>

        <!--Link the main external style sheet-->
        <link rel="stylesheet" href="../styles.css">

        <script>
            import * as img from '../Images/';
            function loadImages()
            {
                for (var i=0;i<img.length;i++)
                {
                    document.querySelector("renders-image-container").innerHTML+=('<img src='+img[i].src + '/>');
                }
            }
        </script>
    </head>

    <Body onload="loadImages()">
        <div class="renders-image-container">
            <img src="../Images/CarDithered.png" alt="Anime sports car, dithered"/>
            <img src="../Images/croisantmanDithered1.jpg" alt="Croissant man, dithered"/>
            <img src="../Images/postureMan.png" alt="A man with bad posture, in many different positions"/>
            <img src="../Images/IsoRoom.png" alt="An Isometric room"/>
            <img src="../Images/Tank1.png" alt="A hard-surface modelled tank"/>
            <img src="../Images/warmVibeFinal.png" alt="Stylised render of a window"/>
            <img src="../Images/croisantmanDithered1FuckedUp.jpg" alt="Croissant man, but with glitch effect"/>
            <img src="../Images/liminalTest1.png" alt="A liminal pool room"/>
        </div>
